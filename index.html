<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bloom Kids - Mapa Pro 60 Niveles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; font-family: 'Nunito', sans-serif;
            overflow: hidden; display: flex; justify-content: center;
        }

        #phone-viewport {
            width: 100vw; max-width: 430px; height: 100vh;
            position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #header-ui {
            position: absolute; top: 0; width: 100%; height: 80px;
            z-index: 1000; display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .coins-badge {
            background: white; border-radius: 50px; padding: 6px 15px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 0 #ccc; border: 2px solid white;
        }

        #map-scroll {
            width: 100%; height: 100%;
            overflow-y: scroll; scrollbar-width: none;
            position: relative; scroll-behavior: smooth;
            background: #2d5a27; /* Fondo base para evitar huecos blancos */
        }
        #map-scroll::-webkit-scrollbar { display: none; }

        /* CONTENEDOR DE MUNDOS CON FUSIÓN */
        .world-bg {
            width: 100%; height: 1200px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            /* Suavizado de bordes entre mundos */
            margin-bottom: -2px; 
        }

        /* Degradado para eliminar el "machetazo" */
        .world-bg::after {
            content: '';
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 150px;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.2));
            pointer-events: none;
        }

        #m1 { background-image: url('https://i.imgur.com/ZSzaWM0.png'); }
        #m2 { background-image: url('https://i.imgur.com/uo1y9hj.png'); }
        #m3 { background-image: url('https://i.imgur.com/Dd32UFN.png'); }
        #m4 { background-image: url('https://i.imgur.com/D3Nh9Yv.png'); }
        #m5 { background-image: url('https://i.imgur.com/zfM1RWs.png'); }

        .level-node {
            position: absolute; width: 80px; height: 80px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; transform: translateX(-50%);
        }

        .pollito {
            width: 90px; height: 90px;
            background-image: url('https://i.imgur.com/vI45EIV.png');
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.2s;
            image-rendering: -webkit-optimize-contrast; /* Mejora calidad visual */
        }

        .unlocked {
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.9));
            animation: bounce 2.5s infinite ease-in-out;
        }

        .locked {
            filter: grayscale(100%) opacity(0.65);
        }

        .level-tag {
            background: rgba(255, 255, 255, 0.95); color: #222;
            padding: 3px 12px; border-radius: 12px;
            font-size: 13px; font-weight: 900;
            margin-top: -12px; border: 2px solid #ddd;
        }

        @keyframes bounce { 
            0%, 100% { transform: translateY(0) scale(1); } 
            50% { transform: translateY(-12px) scale(1.08); } 
        }

        .world-title {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 8px 25px;
            border-radius: 30px; font-size: 20px; text-transform: uppercase;
            letter-spacing: 2px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div id="phone-viewport">
    <div id="header-ui">
        <div style="color:white; text-shadow: 2px 2px #000; font-size: 20px; font-weight: 900;">BLOOM KIDS</div>
        <div class="coins-badge">
            <span style="font-weight:900; color: #444;">264</span>
            <div style="width:22px; height:22px; background:#FFD700; border-radius:50%; border:2px solid #DAA520; box-shadow: inset 0 0 5px white;"></div>
        </div>
    </div>

    <div id="map-scroll">
        </div>
</div>

<script>
    const scroller = document.getElementById('map-scroll');
    const userLevel = 1; 

    // COORDENADAS PARA LOS 60 NIVELES (12 POR MUNDO)

        // MUNDO 1 (Bosque)

        { l: 3, world: 'm1', left: 35, top: 850 },
        { l: 4, world: 'm1', left: 50, top: 765 },
        { l: 5, world: 'm1', left: 64, top: 700 },
        { l: 6, world: 'm1', left: 80, top: 620 },
        { l: 7, world: 'm1', left: 70, top: 520 },
        { l: 8, world: 'm1', left: 45, top: 440 },
        { l: 9, world: 'm1', left: 25, top: 350 },
        { l: 10, world: 'm1', left: 35, top: 250 },
        { l: 11, world: 'm1', left: 60, top: 150 },
        { l: 12, world: 'm1', left: 50, top: 50 },

        // MUNDO 2 (Ríos)
        { l: 13, world: 'm2', left: 40, top: 1120 },
        { l: 14, world: 'm2', left: 20, top: 1020 },
        { l: 15, world: 'm2', left: 35, top: 920 },
        { l: 16, world: 'm2', left: 65, top: 820 },
        { l: 17, world: 'm2', left: 80, top: 720 },
        { l: 18, world: 'm2', left: 60, top: 620 },
        { l: 19, world: 'm2', left: 30, top: 520 },
        { l: 20, world: 'm2', left: 25, top: 420 },
        { l: 21, world: 'm2', left: 50, top: 320 },
        { l: 22, world: 'm2', left: 75, top: 250 },
        { l: 23, world: 'm2', left: 65, top: 150 },
        { l: 24, world: 'm2', left: 45, top: 50 },

        // MUNDO 3 (Otoño)
        { l: 25, world: 'm3', left: 55, top: 1120 },
        { l: 26, world: 'm3', left: 75, top: 1020 },
        { l: 27, world: 'm3', left: 65, top: 920 },
        { l: 28, world: 'm3', left: 35, top: 820 },
        { l: 29, world: 'm3', left: 25, top: 720 },
        { l: 30, world: 'm3', left: 45, top: 620 },
        { l: 31, world: 'm3', left: 75, top: 520 },
        { l: 32, world: 'm3', left: 85, top: 420 },

        { l: 36, world: 'm3', left: 65, top: 80 },
        { l: 37, world: 'm3', left: 55, top: 20 },

        // MUNDO 4 (Invierno)
        { l: 38, world: 'm4', left: 45, top: 1120 },
        { l: 39, world: 'm4', left: 25, top: 1020 },

        { l: 42, world: 'm4', left: 80, top: 720 },

        { l: 47, world: 'm4', left: 75, top: 220 },

        { l: 49, world: 'm4', left: 45, top: 30 },

        // MUNDO 5 (Verano)
        { l: 50, world: 'm5', left: 55, top: 1120 },
        { l: 51, world: 'm5', left: 75, top: 1020 },
        { l: 52, world: 'm5', left: 65, top: 920 },
        { l: 53, world: 'm5', left: 35, top: 820 },
        { l: 54, world: 'm5', left: 25, top: 720 },
        { l: 55, world: 'm5', left: 45, top: 620 },
        { l: 56, world: 'm5', left: 70, top: 520 },
        { l: 57, world: 'm5', left: 80, top: 420 },
        { l: 58, world: 'm5', left: 60, top: 320 },
        { l: 59, world: 'm5', left: 40, top: 200 },
        { l: 60, world: 'm5', left: 55, top: 80 }
    ];

    const worldsInfo = [
        { id: 'm5', title: 'Verano Radiante' },
        { id: 'm4', title: 'Paso Nevado' },
        { id: 'm3', title: 'Bosque Dorado' },
        { id: 'm2', title: 'Valle de los Ríos' },
        { id: 'm1', title: 'Bosque Inicial' }
    ];

    // GENERACIÓN LÓGICA
    worldsInfo.forEach(w => {
        const worldDiv = document.createElement('div');
        worldDiv.id = w.id;
        worldDiv.className = 'world-bg';
        worldDiv.innerHTML = `<div class="world-title">${w.title}</div>`;

        const worldLevels = levelCoords.filter(l => l.world === w.id);
        
        worldLevels.forEach(lev => {
            const node = document.createElement('div');
            node.className = 'level-node';
            node.style.left = lev.left + '%';
            node.style.top = lev.top + 'px';

            const p = document.createElement('div');
            p.className = `pollito ${lev.l <= userLevel ? 'unlocked' : 'locked'}`;
            
            const tag = document.createElement('div');
            tag.className = 'level-tag';
            tag.innerText = `Niv. ${lev.l}`;

            node.appendChild(p);
            node.appendChild(tag);
            worldDiv.appendChild(node);
        });

        scroller.appendChild(worldDiv);
    });

    window.onload = () => {
        scroller.scrollTop = scroller.scrollHeight;
    };
</script>

</body>
</html>
